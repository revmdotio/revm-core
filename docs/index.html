<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REVM Protocol — Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="REVM Protocol documentation — Ant Colony Optimization routing engine for Solana">
  <link rel="icon" href="https://revm.io/assets/face.png">
  <style>
    :root {
      --theme-color: #00ff41;
    }
    body {
      background: #0a0a0a;
    }
    .sidebar {
      background: #0a0a0a !important;
      border-right: 1px solid #1a1a2e !important;
    }
    .sidebar ul li a {
      color: #ccc !important;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a.active {
      color: #00ff41 !important;
    }
    .sidebar .app-name {
      color: #00ff41 !important;
    }
    .markdown-section {
      color: #e0e0e0 !important;
    }
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      color: #00ff41 !important;
    }
    .markdown-section a {
      color: #ff6600 !important;
    }
    .markdown-section code {
      background: #1a1a2e !important;
      color: #00ff41 !important;
      border-radius: 0 !important;
    }
    .markdown-section pre {
      background: #0d0d1a !important;
      border: 1px solid #1a1a2e !important;
      border-radius: 0 !important;
    }
    .markdown-section pre code {
      color: #e0e0e0 !important;
    }
    .markdown-section table th {
      background: #1a1a2e !important;
      color: #00ff41 !important;
    }
    .markdown-section table td {
      border-color: #1a1a2e !important;
    }
    .markdown-section table tr {
      background: #0a0a0a !important;
      color: #ccc !important;
    }
    .markdown-section blockquote {
      border-left: 4px solid #ff6600 !important;
      color: #aaa !important;
    }
    .search input {
      background: #1a1a2e !important;
      color: #e0e0e0 !important;
      border: 1px solid #333 !important;
      border-radius: 0 !important;
    }
    .app-nav {
      background: #0a0a0a !important;
    }
    body .content {
      background: #0a0a0a !important;
    }
    .cover-main {
      color: #e0e0e0 !important;
    }
    .docs-banner {
      position: fixed;
      top: 0;
      left: 300px;
      right: 0;
      z-index: 10;
      background: #0a0a0a;
      border-bottom: 2px solid #1a1a2e;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .docs-banner-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .docs-banner-left img {
      height: 32px;
    }
    .docs-banner-left span {
      color: #00ff41;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
    }
    .docs-banner a.gh-link {
      color: #666 !important;
      font-size: 12px;
      text-decoration: none !important;
      font-family: monospace;
      border: 1px solid #333;
      padding: 4px 12px;
    }
    .docs-banner a.gh-link:hover {
      color: #00ff41 !important;
      border-color: #00ff41;
    }
    .content {
      padding-top: 55px !important;
    }
    @media (max-width: 768px) {
      .docs-banner {
        left: 0;
      }
    }
    .sidebar .app-name img {
      width: 36px;
      vertical-align: middle;
      margin-right: 8px;
    }
    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #1a1a2e;
    }
  </style>
</head>
<body>
  <div class="docs-banner">
    <div class="docs-banner-left">
      <img src="https://revm.io/assets/face.png" alt="REVM">
      <span>REVM DOCS</span>
    </div>
    <a class="gh-link" href="https://github.com/revmdotio/revm-core" target="_blank">GitHub</a>
  </div>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<img src="https://revm.io/assets/face.png" alt="REVM" style="width:36px;vertical-align:middle;margin-right:8px;">REVM Protocol',
      repo: false,
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        depth: 3,
      },
      themeColor: '#00ff41',
      coverpage: false,
      notFoundPage: true,
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
