<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REVM Protocol Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://revm.io/assets/face.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #00ff41;
      --base-background-color: #0a0a0a;
      --sidebar-background: #0a0a0a;
      --sidebar-border-color: #1a1a2e;
      --sidebar-nav-link-color--active: #00ff41;
      --sidebar-nav-link-color--hover: #00ff41;
      --sidebar-name-color: #00ff41;
      --link-color: #ff6600;
      --heading-color: #00ff41;
      --code-inline-background: #1a1a2e;
      --code-inline-color: #00ff41;
      --code-block-background: #0d0d1a;
      --code-block-border-radius: 0;
      --blockquote-border-color: #ff6600;
    }
    .github-corner svg { display: none !important; }
    .github-corner {
      width: 80px !important;
      height: 80px !important;
      overflow: visible !important;
    }
    .github-corner img {
      width: 80px;
      height: 80px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'REVM Protocol',
      repo: 'https://github.com/revmdotio/revm-core',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        depth: 3,
      },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            var corner = document.querySelector('.github-corner');
            if (corner && !corner.querySelector('img')) {
              var svg = corner.querySelector('svg');
              if (svg) svg.remove();
              var img = document.createElement('img');
              img.src = 'https://raw.githubusercontent.com/revmdotio/revm-core/main/docs/docs.png';
              corner.appendChild(img);
            }
          });
        }
      ],
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
