[package]
name = "revm-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "ACO routing engine for Solana transaction delivery"

[lib]
name = "revm_core"
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.34", features = ["full"] }
rand = "0.8.5"
log = "0.4"
thiserror = "1.0"
parking_lot = "0.12"
